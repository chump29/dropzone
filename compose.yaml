services:
  dropzonebot:
    container_name: dropzonebot
    image: git.postfmly.com/admin/dropzonebot:arm64
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - db:/app/db
    environment:
      - TZ=America/Chicago
    env_file: .env
    labels:
      - wud.display.name=DropZoneBot
      - homepage.group=Personal
      - homepage.name=DropZoneBot
      - homepage.icon=https://dropzonebot.postfmly.com/dropzonebot.png

volumes:
  db:

networks: {}
